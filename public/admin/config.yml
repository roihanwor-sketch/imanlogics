local_backend: true
backend:
  name: git-gateway
  branch: main
publish_mode: simple
media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "pengaturan"
    label: "⚙️ Pengaturan Website"
    files:
      - label: "Tema Global"
        name: "global"
        file: "data/global.json"
        fields:
          - {label: "Warna Background Utama", name: "bg_color", widget: "color", default: "#0B0F19"}
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Awalan Brand", name: "brand_prefix", widget: "string"}
              - {label: "Akhiran Brand", name: "brand_suffix", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - label: "Navigasi"
                name: "nav"
                widget: "list"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "Tautan", name: "link", widget: "string"}
              - label: "Sosial Media"
                name: "socials"
                widget: "list"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "Tautan", name: "link", widget: "string"}
              - {label: "Copyright", name: "copyright", widget: "string"}
              - {label: "Teks Built With", name: "built_with", widget: "string"}

  - name: "halaman"
    label: "📝 Teks Halaman Utama"
    files:
      - label: "Teks Beranda"
        name: "beranda"
        file: "data/beranda.json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Judul Utama", name: "title", widget: "string"}
              - {label: "Teks Gradasi", name: "highlight", widget: "string"}
              - {label: "Deskripsi", name: "description", widget: "text"}
              - {label: "Teks Tombol 1", name: "btn_primary", widget: "string"}
              - {label: "Teks Tombol 2", name: "btn_secondary", widget: "string"}
          - label: "Fokus Utama"
            name: "fokus"
            widget: "object"
            fields:
              - {label: "Judul", name: "title", widget: "string"}
              - label: "Item Fokus"
                name: "items"
                widget: "list"
                field: {label: "Item", name: "item", widget: "string"}
          - label: "Tentang"
            name: "tentang"
            widget: "object"
            fields:
              - {label: "Judul", name: "title", widget: "string"}
              - {label: "Highlight", name: "highlight", widget: "string"}
              - label: "Paragraf"
                name: "paragraphs"
                widget: "list"
                field: {label: "Paragraf", name: "paragraph", widget: "text"}
              - label: "Badge Info"
                name: "badge"
                widget: "object"
                fields:
                  - {label: "Teks Sistem", name: "sys", widget: "string"}
                  - {label: "Judul Badge", name: "title", widget: "string"}
                  - {label: "Subjudul Badge", name: "subtitle", widget: "string"}
          - label: "Alur Logika"
            name: "alur"
            widget: "object"
            fields:
              - {label: "Judul Utama", name: "title", widget: "string"}
              - {label: "Subjudul", name: "subtitle", widget: "string"}
              - label: "Langkah-langkah"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Nomor Langkah", name: "step", widget: "string"}
                  - {label: "Judul Langkah", name: "title", widget: "string"}
                  - {label: "Deskripsi Langkah", name: "desc", widget: "text"}
          - label: "CTA Penutup"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Judul Utama", name: "title", widget: "string"}
              - {label: "Highlight", name: "highlight", widget: "string"}
              - {label: "Deskripsi", name: "description", widget: "text"}
              - {label: "Teks Tombol 1", name: "btn_primary", widget: "string"}
              - {label: "Teks Tombol 2", name: "btn_secondary", widget: "string"}
      - label: "Tentang Pembuat (Profil)"
        name: "profil"
        file: "data/profil.json"
        fields:
          - {label: "Nama", name: "name", widget: "string", default: "Iman Logics"}
          - {label: "Deskripsi Profil", name: "description", widget: "text"}
          - label: "Daftar Badge (Keahlian/Minat)"
            name: "badges"
            widget: "list"
            field: {label: "Nama Badge", name: "badge", widget: "string"}

      - label: "Halaman Bio Link"
        name: "links"
        file: "data/links.json"
        fields:
          - {label: "Avatar Profil", name: "avatar", widget: "image", default: "/logo.png"}
          - {label: "Nama Profil", name: "title", widget: "string", default: "Iman Logics"}
          - {label: "Tagline", name: "tagline", widget: "string", default: "AI Systems • Digital Products"}
          - label: "Tombol Tautan"
            name: "buttons"
            widget: "list"
            fields:
              - {label: "Judul Tombol", name: "title", widget: "string"}
              - {label: "Subjudul/Deskripsi", name: "subtitle", widget: "string", required: false}
              - {label: "Tautan (URL)", name: "url", widget: "string"}
              - {label: "Tipe Ikon", name: "type", widget: "select", options: ["product", "website", "whatsapp", "custom"]}
              - {label: "Gambar Kiri (Opsional)", name: "image", widget: "image", required: false}
          - {label: "Copyright", name: "copyright", widget: "string", default: "© 2026 Iman Logics. All rights reserved."}
          - {label: "Teks Pendukung Footer", name: "built_with", widget: "string", default: "Built as a Digital Garden."}

  - name: "portfolio"
    label: "📂 Portofolio & Eksperimen"
    label_singular: "Proyek"
    files:
      - label: "Data Portofolio"
        name: "portfolio_data"
        file: "data/portfolio.json"
        fields:
          - label: "Daftar Portofolio"
            name: "items"
            widget: "list"
            fields:
              - {label: "Slug (URL)", name: "slug", widget: "string"}
              - {label: "Nama/Judul", name: "name", widget: "string"}
              - {label: "Kategori/Badge", name: "badge", widget: "string"}
              - {label: "Deskripsi", name: "description", widget: "text"}
              - {label: "Status", name: "status", widget: "select", options: ["concept", "research", "prototype", "inprogress", "available", "live"]}
              - {label: "Icon", name: "icon", widget: "string", default: "lightning"}
              - {label: "Logo Image", name: "logoImage", widget: "image", required: false}
              - {label: "Showcase Images", name: "showcaseImages", widget: "list", field: {label: "Image", name: "image", widget: "image"}, required: false}
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
                  - label: "Primary CTA"
                    name: "primaryCta"
                    widget: "object"
                    fields: [{label: "Text", name: "text", widget: "string"}, {label: "Href", name: "href", widget: "string"}]
                  - label: "Secondary CTA"
                    name: "secondaryCta"
                    widget: "object"
                    fields: [{label: "Text", name: "text", widget: "string"}, {label: "Href", name: "href", widget: "string"}]
              - {label: "Trust Bar Items", name: "trustBar", widget: "list", field: {name: "item", widget: "string"}}
              - label: "Problems"
                name: "problems"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Subtitle", name: "subtitle", widget: "string"}
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
                  - label: "Highlighted Item"
                    name: "highlightedItem"
                    widget: "object"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
              - label: "Solution"
                name: "solution"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "list", field: {name: "paragraph", widget: "text"}}
                  - {label: "Quote", name: "quote", widget: "text"}
                  - label: "CTA"
                    name: "cta"
                    widget: "object"
                    fields: [{label: "Text", name: "text", widget: "string"}, {label: "Href", name: "href", widget: "string"}]
              - label: "How It Works"
                name: "howItWorks"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Subtitle", name: "subtitle", widget: "string"}
                  - label: "Steps"
                    name: "steps"
                    widget: "list"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Step Number", name: "stepNumber", widget: "number", value_type: "int"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
              - label: "Benefits"
                name: "benefits"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
                  - label: "Highlighted Item"
                    name: "highlightedItem"
                    widget: "object"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
              - label: "Pricing"
                name: "pricing"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Subtitle", name: "subtitle", widget: "string"}
                  - {label: "Original Price", name: "originalPrice", widget: "string"}
                  - {label: "Current Price", name: "currentPrice", widget: "string"}
                  - {label: "Features", name: "features", widget: "list", field: {name: "feature", widget: "string"}}
                  - {label: "Bonuses", name: "bonuses", widget: "list", field: {name: "bonus", widget: "string"}, required: false}
                  - label: "CTA"
                    name: "cta"
                    widget: "object"
                    fields: [{label: "Text", name: "text", widget: "string"}, {label: "Href", name: "href", widget: "string"}]
              - label: "FAQ"
                name: "faq"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "Question", name: "question", widget: "string"}
                      - {label: "Answer", name: "answer", widget: "text"}

