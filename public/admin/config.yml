                  - {label: "Subtitle", name: "subtitle", widget: "string"}
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
                  - label: "Highlighted Item"
                    name: "highlightedItem"
                    widget: "object"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
              - label: "Solution"
                name: "solution"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "list", field: {name: "paragraph", widget: "text"}}
                  - {label: "Quote", name: "quote", widget: "text"}
                  - label: "CTA"
                    name: "cta"
                    widget: "object"
                    fields: [{label: "Text", name: "text", widget: "string"}, {label: "Href", name: "href", widget: "string"}]
              - label: "How It Works"
                name: "howItWorks"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Subtitle", name: "subtitle", widget: "string"}
                  - label: "Steps"
                    name: "steps"
                    widget: "list"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Step Number", name: "stepNumber", widget: "number", value_type: "int"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
              - label: "Benefits"
                name: "benefits"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
                  - label: "Highlighted Item"
                    name: "highlightedItem"
                    widget: "object"
                    fields:
                      - {label: "ID", name: "id", widget: "string"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}
                      - {label: "Icon", name: "icon", widget: "string"}
              - label: "Pricing"
                name: "pricing"
                widget: "object"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
